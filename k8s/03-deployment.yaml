###############################################################################
# TaskApp — Deployment (zero-downtime rolling update)
# Image is replaced by Jenkins/GitHub Actions at deploy time
###############################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskapp-deployment
  namespace: production
  labels:
    app: taskapp
    tier: frontend
  annotations:
    kubernetes.io/change-cause: "initial deployment"
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: taskapp
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: taskapp
        tier: frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      terminationGracePeriodSeconds: 60

      initContainers:
        - name: migrate
          image: sumitpaltech/taskapp:latest
          command: ["/bin/sh", "-c", "php artisan migrate --force 2>&1 || echo 'Tables already exist, skipping'"]
          envFrom:
            - configMapRef:
                name: taskapp-config
            - secretRef:
                name: taskapp-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi

      containers:
        - name: taskapp
          image: sumitpaltech/taskapp:latest
          ports:
            - containerPort: 80
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: taskapp-config
            - secretRef:
                name: taskapp-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10

          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /ready
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2

          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "nginx -s quit && sleep 5"]

          volumeMounts:
            - name: storage-volume
              mountPath: /var/www/html/storage/app/public/uploads

      volumes:
        - name: storage-volume
          persistentVolumeClaim:
            claimName: taskapp-uploads-pvc
