apiVersion: v1
kind: ConfigMap
metadata:
  name: taskapp-config
  namespace: production
  labels:
    app: taskapp
data:
  APP_NAME: "TaskApp"
  APP_ENV: "production"
  APP_DEBUG: "false"
  APP_URL: "http://localhost:8080"
  LOG_CHANNEL: "stack"
  LOG_LEVEL: "warning"
  DB_CONNECTION: "mysql"
  DB_PORT: "3306"
  CACHE_DRIVER: "file"
  SESSION_DRIVER: "file"
  SESSION_LIFETIME: "120"
  SESSION_SECURE_COOKIE: "false"
  SESSION_DOMAIN: ""
  QUEUE_CONNECTION: "sync"
  BROADCAST_DRIVER: "log"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: taskapp-config
  namespace: staging
  labels:
    app: taskapp
data:
  APP_NAME: "TaskApp"
  APP_ENV: "staging"
  APP_DEBUG: "false"
  APP_URL: "http://localhost:8080"
  LOG_CHANNEL: "stack"
  LOG_LEVEL: "debug"
  DB_CONNECTION: "mysql"
  DB_PORT: "3306"
  CACHE_DRIVER: "file"
  SESSION_DRIVER: "file"
  SESSION_LIFETIME: "120"
  QUEUE_CONNECTION: "sync"
  BROADCAST_DRIVER: "log"
