###############################################################################
# TaskApp — Ingress (NGINX Ingress Controller)
# For local Minikube access via port-forward, Ingress is not required.
# This manifest is kept for when the app is deployed to a real cluster.
###############################################################################
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: taskapp-ingress
  namespace: production
  labels:
    app: taskapp
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-body-size: "25m"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: taskapp-service
                port:
                  number: 80
